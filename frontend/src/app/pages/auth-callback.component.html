<div class="page">
  <div class="card">
    @if (message) {
      <div class="state error">
        <span class="state-ico" aria-hidden="true">!</span>
        <p>{{ message }}</p>
        <a routerLink="/login" class="link">Volver al inicio de sesión</a>
      </div>
    } @else {
      <div class="state ok">
        <div class="spinner" aria-hidden="true"></div>
        <p class="title">Completando inicio de sesión</p>
        <p class="sub">Intercambiando el código con el API…</p>
      </div>
    }
  </div>
</div>
